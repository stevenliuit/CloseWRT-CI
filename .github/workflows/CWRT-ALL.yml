#CI项目
name: CWRT-ALL

#CI计划
on:
  #自动编译：每周一早上5点
  schedule:
    - cron: 0 21 * * 0
  #手动编译
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '追加 .config 行，每行一条 CONFIG_PACKAGE_xxx=y。默认包含 Packages.sh 中已启用的所有插件，留空则只装基础组件。'
        default: |
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-aurora=y
          CONFIG_PACKAGE_luci-app-aurora-config=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-tailscale=y
          CONFIG_PACKAGE_luci-app-ddns-go=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-mini-diskmanager=y
          CONFIG_PACKAGE_luci-app-easytier=y
          CONFIG_PACKAGE_luci-app-mosdns=y
          CONFIG_PACKAGE_luci-app-netspeedtest=y
          CONFIG_PACKAGE_luci-app-netwizard=y
          CONFIG_PACKAGE_luci-app-partexp=y
          CONFIG_PACKAGE_luci-app-qmodem=y
          CONFIG_PACKAGE_luci-app-quickfile=y
          CONFIG_PACKAGE_luci-app-timecontrol=y
          CONFIG_PACKAGE_luci-app-viking=y
          CONFIG_PACKAGE_luci-app-vnt=y
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

#CI权限
permissions: write-all

#CI任务
jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Releases and Workflows
        uses: ophub/delete-releases-workflows@main
        with:
          gh_token: ${{secrets.GITHUB_TOKEN}}
          delete_releases: true
          releases_keep_latest: 0
          delete_tags: true
          delete_workflows: true
          workflows_keep_day: 0

  config:
    needs: cleanup
    name: ${{matrix.CONFIG}}
    strategy:
      fail-fast: false
      #max-parallel: 4
      matrix:
        CONFIG: [MT7981, MT7986]
        REPO_INFO:
          - {SOURCE: "Yuzhii0718/immortalwrt-mt798x-6.6-padavanonly", BRANCH: "openwrt-24.10-6.6"}
          #- {SOURCE: "chasey-dev/immortalwrt-mt798x-rebase", BRANCH: "25.12"}

    #调用公用编译核心WRT-CORE.yml
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      #编译配置
      WRT_CONFIG: ${{matrix.CONFIG}}
      #默认主题
      WRT_THEME: aurora
      #默认主机名
      WRT_NAME: CWRT
      #默认WIFI名称
      WRT_SSID: CWRT
      #默认WIFI密码
      WRT_WORD: 12345678
      #默认地址
      WRT_IP: 192.168.10.1
      #默认密码，仅作提示，修改无用
      WRT_PW: 无
      #源码链接
      WRT_REPO: https://github.com/${{matrix.REPO_INFO.SOURCE}}.git
      #源码分支
      WRT_BRANCH: ${{matrix.REPO_INFO.BRANCH}}
      #源码名称
      WRT_SOURCE: ${{matrix.REPO_INFO.SOURCE}}
      #插件调整
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      #仅输出配置文件
      WRT_TEST: ${{inputs.TEST}}
